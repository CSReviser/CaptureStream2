name: 1. MacOS 26 qt6.11 ARM f81 cmake C/C++ CI

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-26

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.11.*
        modules: 'qtcharts'

    - name: Setup FFmpeg
      uses: AnimMouse/setup-ffmpeg@v1
      with:
        version: 71
        
    - uses: actions/checkout@v6
    - name: cmake
      run: cmake -S ./ -B ./ -DCMAKE_OSX_ARCHITECTURES="arm64"
    - name: make
      run: make
      
    - name: Make CaptureStream2 executable
      run: |
        wget -qO ffmpeg8arm.zip https://www.osxexperts.net/ffmpeg81arm.zip
        7z e ffmpeg8arm.zip ffmpeg -o./CaptureStream2.app/Contents/MacOS/
        chmod -R 755 ./CaptureStream2.app
        xattr -rc ./CaptureStream2.app
 
    - name: mkdir
      run: mkdir -p ./build/MacCaptureStream2

    - name: Tar files
      run: tar cvf CaptureStream2.tar ./CaptureStream2.app
      
    - uses: actions/upload-artifact@v4
      with:
        name: CaptureStream2-ARM-qt611
        path: CaptureStream2.tar
