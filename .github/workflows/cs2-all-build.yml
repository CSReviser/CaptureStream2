          hdiutil create -volname MacCaptureStream2 \
                      -srcfolder tmp \
                      -ov -format UDZO \
                      "CaptureStream2-MacOS-qt6-2-${{ github.event.inputs.yyyymmdd }}.dmg"


      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: build/CaptureStream2-MacOS-qt6-2-${{ github.event.inputs.yyyymmdd }}.dmg
          tag_name: ${{ needs.mac_build.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

